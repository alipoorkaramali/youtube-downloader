*"NEW3.1-costume-Multi-Platform"*|*"costume"*)
    echo -e "${CYAN}--- Costume Downloader (video/audio) ---${NC}"
    echo -ne "Platform (youtube/soundcloud): "
    read platform
    if [[ "$platform" != "youtube" ]]; then
        echo -ne "URL: "
        read url
        echo -ne "Format (video/audio) [video]: "
        read format; format=${format:-video}
        echo -ne "Folder [downloads]: "
        read folder; folder=${folder:-downloads}
        format_code=""
        input_json=$(jq -n \
            --arg platform "$platform" \
            --arg url "$url" \
            --arg format "$format" \
            --arg folder "$folder" \
            --arg format_code "$format_code" \
            '{platform: $platform, url: $url, format: $format, folder: $folder, format_code: $format_code}')
    else
        echo -ne "YouTube URL: "
        read url
        echo -ne "Format (video/audio) [video]: "
        read format; format=${format:-video}
        
        # 1. Trigger the helper workflow to get format list
        echo -e "${YELLOW}🚀 Triggering format list fetcher...${NC}"
        helper_wf_id=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repo/actions/workflows" | \
            jq -r '.workflows[] | select(.name | contains("Get YouTube Format List")) | .id' | head -1)
        if [[ -z "$helper_wf_id" ]]; then
            echo -e "${RED}Helper workflow not found. Please create 'Get YouTube Format List.yml' first.${NC}"
            read -p "Press Enter to continue..."
            continue
        fi
        
        # Dispatch helper
        helper_payload=$(jq -n --arg ref "$default_branch" --arg url "$url" '{ref: $ref, inputs: {url: $url}}')
        curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$repo/actions/workflows/$helper_wf_id/dispatches" \
            -d "$helper_payload" > /dev/null
        
        echo -e "${GREEN}✅ Helper workflow dispatched. Waiting for it to complete...${NC}"
        
        # Wait for the latest run of helper workflow to finish (max 60 seconds)
        for i in {1..30}; do
            sleep 2
            run_info=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/$repo/actions/workflows/$helper_wf_id/runs?per_page=1" | \
                jq -r '.workflow_runs[0]')
            status=$(echo "$run_info" | jq -r '.status')
            conclusion=$(echo "$run_info" | jq -r '.conclusion')
            if [[ "$status" == "completed" ]]; then
                echo -e "${GREEN}✅ Helper run completed.${NC}"
                run_id=$(echo "$run_info" | jq -r '.id')
                break
            fi
            echo -n "."
        done
        
        # Find the generated format list file
        echo -e "${CYAN}📥 Fetching format list file...${NC}"
        # Get the list of files in repo root (using GitHub API)
        contents=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repo/contents/")
        format_file=$(echo "$contents" | jq -r '.[] | select(.name | test("format_list_.*\\.txt")) | .name' | sort -r | head -1)
        
        if [[ -z "$format_file" ]]; then
            echo -e "${RED}No format list file found. Please check helper workflow logs.${NC}"
            read -p "Press Enter to continue..."
            continue
        fi
        
        # Download and display the file
        echo -e "${GREEN}Found: $format_file${NC}"
        format_content=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/$repo/contents/$format_file")
        
        echo -e "${CYAN}╔════════════════════════════════════════════════════════════════╗${NC}"
        echo -e "${CYAN}║                      Available Formats                          ║${NC}"
        echo -e "${CYAN}╚════════════════════════════════════════════════════════════════╝${NC}"
        echo "$format_content" | grep -E '^[0-9]+' | awk '{printf "  \033[1;33m%3s\033[0m  %-8s %-15s %s\n", $1, $2, $3, $4}' | head -30
        echo ""
        echo -ne "${YELLOW}Enter format code (e.g., 137+140) or press Enter for auto: ${NC}"
        read format_code
        
        echo -ne "Folder [downloads]: "
        read folder; folder=${folder:-downloads}
        
        input_json=$(jq -n \
            --arg platform "$platform" \
            --arg url "$url" \
            --arg format "$format" \
            --arg folder "$folder" \
            --arg format_code "$format_code" \
            '{platform: $platform, url: $url, format: $format, folder: $folder, format_code: $format_code}')
    fi
    ;;