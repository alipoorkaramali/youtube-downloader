name: 🎬🎵 Costume Downloader + Mega.nz

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - soundcloud
      url:
        description: '🔗 لینک دانلود'
        required: true
      type:
        description: 'نوع دانلود'
        required: true
        default: 'audio'
        type: choice
        options:
          - audio
          - video
      quality:
        description: 'کیفیت (برای ویدیو: 1080p, 720p, best)'
        required: false
        default: 'best'
      folder:
        description: '📁 نام پوشه در مخزن'
        required: false
        default: 'downloads'
      mega_folder:
        description: '📂 نام پوشه در Mega.nz'
        required: false
        default: 'YoutubeDownloads'
      rclone_remote:
        description: '🔑 نام ریموت در rclone.conf (معمولاً mega)'
        required: false
        default: 'mega'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Decrypt cookies (if exists)
        run: |
          if [ -f cookies.txt.gpg ]; then
            gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          else
            echo "⚠️ فایل cookies.txt.gpg یافت نشد، ادامه بدون کوکی"
            touch cookies.txt
          fi

      - name: ⚙️ Setup yt-dlp + ffmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          aria2: true
          ffmpeg: true

      - name: 📦 Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: 🔧 Debug - Write all info to debug.txt
        run: |
          echo "=== شروع دیباگ ===" > debug.txt
          echo "Date: $(date)" >> debug.txt
          echo "" >> debug.txt
          
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf.tmp 2>&1
          
          echo "=== محتوای دیکد شده (بدون رمز) ===" >> debug.txt
          cat ~/.config/rclone/rclone.conf.tmp | sed 's/pass =.*/pass = ***/' | sed 's/token =.*/token = ***/' >> debug.txt
          
          cp ~/.config/rclone/rclone.conf.tmp ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          
          echo "" >> debug.txt
          echo "=== لیست فایل‌های پوشه rclone ===" >> debug.txt
          ls -la ~/.config/rclone/ >> debug.txt 2>&1
          
          echo "" >> debug.txt
          echo "=== تست rclone listremotes ===" >> debug.txt
          rclone listremotes >> debug.txt 2>&1 || echo "ERROR: rclone listremotes failed" >> debug.txt
          
          echo "" >> debug.txt
          echo "=== بخش‌های موجود در فایل (با grep) ===" >> debug.txt
          grep -E '^\[.*\]$' ~/.config/rclone/rclone.conf >> debug.txt 2>&1 || echo "هیچ بخش [name] یافت نشد" >> debug.txt
          
          echo "" >> debug.txt
          echo "=== 5 خط اول فایل ===" >> debug.txt
          head -n 5 ~/.config/rclone/rclone.conf | sed 's/pass =.*/pass = ***/' | sed 's/token =.*/token = ***/' >> debug.txt
          
          echo "" >> debug.txt
          echo "=== پایان دیباگ ===" >> debug.txt
          
          cat debug.txt  # همچنین در لاگ چاپ می‌کند
          
      - name: 📤 Upload debug.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug.txt

      - name: ▶️ دانلود فایل
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          
          if [ "${{ github.event.inputs.platform }}" = "youtube" ]; then
            if [ "${{ github.event.inputs.type }}" = "video" ]; then
              QUALITY="${{ github.event.inputs.quality }}"
              if [ "$QUALITY" = "best" ]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best"
              fi
              echo "🎬 دانلود ویدیو با فرمت: $FORMAT"
              yt-dlp -f "$FORMAT" \
                --merge-output-format mp4 \
                --cookies cookies.txt \
                "${{ github.event.inputs.url }}" \
                -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            else
              echo "🎵 دانلود صوتی با کیفیت بالا"
              yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
                --audio-format mp3 \
                --cookies cookies.txt \
                "${{ github.event.inputs.url }}" \
                -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            fi
          else
            echo "🎧 دانلود از ساوندکلاود به صورت mp3"
            yt-dlp -x --audio-format mp3 \
              --cookies cookies.txt \
              "${{ github.event.inputs.url }}" \
              -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
          fi

      - name: ☁️ آپلود به Mega.nz
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          MEGA_PATH="${REMOTE}:${{ github.event.inputs.mega_folder }}"
          echo "📤 آپلود به ریموت: $REMOTE"
          echo "📂 مسیر مقصد: $MEGA_PATH"
          
          rclone mkdir "$MEGA_PATH" 2>/dev/null || true
          rclone copy "${{ github.event.inputs.folder }}" "$MEGA_PATH" \
            --progress \
            --transfers=4 \
            --verbose
          
          echo "✅ آپلود به Mega.nz با موفقیت انجام شد!"

      - name: 🕒 Commit to Repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ github.event.inputs.folder }}"
          git commit -m "Add downloaded file - ${{ github.event.inputs.url }}" || echo "No changes to commit"
          git push
