name: 🔐🔎Check RSS Log and Trigger Downloads

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run check script (detects new items)
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_and_trigger.py

      - name: Commit updated state files
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          touch processed.txt processed_titles.txt
          git add processed.txt processed_titles.txt
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update processed state"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

# ========== Trigger Auto Downloader + Mega.nz ==========
      - name: 🚀 Trigger Auto Downloader + Mega.nz
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 در حال خواندن لینک جدید از لاگ..."

          if [ -f logs/new_videos.txt ]; then
            DOWNLOAD_URL=$(tail -n 1 logs/new_videos.txt | tr -d '[:space:]')
            
            if [ -n "$DOWNLOAD_URL" ] && [[ "$DOWNLOAD_URL" == *"youtube.com"* || "$DOWNLOAD_URL" == *"youtu.be"* ]]; then
              echo "📹 لینک پیدا شد: $DOWNLOAD_URL"
              
              gh workflow run "Multi-Platform-Downloader-auto-Mega.yml" \
                --repo alipoorkaramali/youtube-SoundCloud-downloader \
                --ref main \
                -f platform=youtube \
                -f url="$DOWNLOAD_URL" \
                -f folder="news_downloads" \
                -f mega_folder="YoutubeNews"
              
              echo "✅ ورک‌فلو Auto + Mega.nz با موفقیت trigger شد."
            else
              echo "⚠️ لینک معتبری پیدا نشد."
            fi
          else
            echo "⚠️ فایل logs/new_videos.txt پیدا نشد."
          fi
