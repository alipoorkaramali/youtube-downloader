name: 🔐 Check Log & Trigger Downloader

on:
  schedule:
    - cron: '*/10 * * * *'     # هر ۱۰ دقیقه اجرا شود
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout youtube-news-watcher
        uses: actions/checkout@v4
        with:
          repository: alipoorkaramali/youtube-news-watcher
          ref: main
          path: news-watcher

      - name: 📂 Copy logs to current repository
        run: |
          mkdir -p logs
          cp -r news-watcher/logs/* logs/ 2>/dev/null || echo "No logs folder found"
          echo "✅ لاگ‌ها کپی شدند."

      - name: 🔍 Check for new videos
        id: check
        run: |
          if [ -f logs/new_videos.txt ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 فایل new_videos.txt پیدا شد."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ فایل new_videos.txt وجود ندارد."
          fi

      - name: 📋 Show latest URL
        run: |
          if [ -f logs/new_videos.txt ]; then
            echo "آخرین لینک:"
            tail -n 5 logs/new_videos.txt
          fi

      # ====================== Trigger Auto Downloader + Mega.nz ======================
      - name: 🚀 Trigger Auto Downloader + Mega.nz
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 در حال خواندن آخرین لینک..."

          if [ -f logs/new_videos.txt ]; then
            DOWNLOAD_URL=$(tail -n 1 logs/new_videos.txt | tr -d '[:space:]')
            
            if [ -n "$DOWNLOAD_URL" ] && [[ "$DOWNLOAD_URL" == *"youtube.com"* || "$DOWNLOAD_URL" == *"youtu.be"* ]]; then
              echo "📹 لینک پیدا شد: $DOWNLOAD_URL"
              
              gh workflow run "Multi-Platform-Downloader-auto-Mega.yml" \
                --repo alipoorkaramali/youtube-SoundCloud-downloader \
                --ref main \
                -f platform=youtube \
                -f url="$DOWNLOAD_URL" \
                -f folder="news_downloads" \
                -f mega_folder="YoutubeNews"
              
              echo "✅ ورک‌فلو Auto + Mega.nz با موفقیت trigger شد."
            else
              echo "⚠️ لینک معتبری پیدا نشد."
            fi
          else
            echo "⚠️ فایل logs/new_videos.txt پیدا نشد."
          fi

      - name: 🧹 Cleanup
        run: |
          rm -rf news-watcher
