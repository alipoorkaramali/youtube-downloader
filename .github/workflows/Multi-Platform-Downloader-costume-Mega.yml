name: 🎬🎵 Costume Downloader + Mega.nz (with ZIP split)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - soundcloud
      url:
        description: '🔗 لینک دانلود'
        required: true
      type:
        description: 'نوع دانلود'
        required: true
        default: 'audio'
        type: choice
        options:
          - audio
          - video
      quality:
        description: 'کیفیت (برای ویدیو: 1080p, 720p, best)'
        required: false
        default: 'best'
      folder:
        description: '📁 نام پوشه موقت'
        required: false
        default: 'downloads'
      mega_folder:
        description: '📂 نام پوشه در Mega.nz'
        required: false
        default: 'YoutubeDownloads'
      split_choice:
        description: 'تقسیم فایل به چند قسمت (ZIP volume)؟'
        required: true
        default: 'single'
        type: choice
        options:
          - single
          - split
      split_size:
        description: 'اندازه هر قسمت (مثال: 100M, 500M, 1G)'
        required: false
        default: '100M'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Decrypt cookies (if exists)
        run: |
          if [ -f cookies.txt.gpg ]; then
            gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          else
            echo "⚠️ فایل cookies.txt.gpg یافت نشد، ادامه بدون کوکی"
            touch cookies.txt
          fi

      - name: ⚙️ Setup yt-dlp + ffmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          aria2: true
          ffmpeg: true

      - name: 📦 Install latest rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: 🔓 Decrypt rclone config
        run: |
          mkdir -p ~/.config/rclone
          if [ ! -f rclone_mega.conf.gpg ]; then
            echo "❌ فایل rclone_mega.conf.gpg در ریشه مخزن پیدا نشد!"
            exit 1
          fi
          gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.RCLONE_PASSPHRASE }}" --output ~/.config/rclone/rclone.conf rclone_mega.conf.gpg
          chmod 600 ~/.config/rclone/rclone.conf
          echo "✅ rclone config loaded"
          rclone --config ~/.config/rclone/rclone.conf listremotes

      - name: ▶️ دانلود فایل
        id: download
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          cd "${{ github.event.inputs.folder }}"
          
          if [ "${{ github.event.inputs.platform }}" = "youtube" ]; then
            if [ "${{ github.event.inputs.type }}" = "video" ]; then
              QUALITY="${{ github.event.inputs.quality }}"
              if [ "$QUALITY" = "best" ]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best"
              fi
              echo "🎬 دانلود ویدیو با فرمت: $FORMAT"
              yt-dlp -f "$FORMAT" --merge-output-format mp4 --cookies ../cookies.txt "${{ github.event.inputs.url }}" -o "%(title)s.%(ext)s"
            else
              echo "🎵 دانلود صوتی با کیفیت بالا (MP3)"
              yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" --audio-format mp3 --cookies ../cookies.txt "${{ github.event.inputs.url }}" -o "%(title)s.%(ext)s"
            fi
          else
            echo "🎧 دانلود از ساوندکلاود به صورت MP3"
            yt-dlp -x --audio-format mp3 --cookies ../cookies.txt "${{ github.event.inputs.url }}" -o "%(title)s.%(ext)s"
          fi
          
          DOWNLOADED_FILE=$(ls | head -1)
          echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV

      - name: ✂️ Split into zip volumes (if requested)
        if: github.event.inputs.split_choice == 'split'
        run: |
          cd "${{ github.event.inputs.folder }}"
          FILE="${{ env.DOWNLOADED_FILE }}"
          SIZE="${{ github.event.inputs.split_size }}"
          sudo apt-get install -y zip
          echo "Creating zip volumes of $SIZE from $FILE"
          zip -s "$SIZE" "${FILE}.zip" "$FILE"
          rm "$FILE"
          echo "✅ Zip volumes created:"
          ls -la

      - name: ☁️ آپلود به Mega.nz
        run: |
          CONFIG_FILE="$HOME/.config/rclone/rclone.conf"
          REMOTE_PATH="mega:${{ github.event.inputs.mega_folder }}"
          rclone --config "$CONFIG_FILE" mkdir "$REMOTE_PATH" 2>/dev/null || true
          rclone --config "$CONFIG_FILE" copy "${{ github.event.inputs.folder }}" "$REMOTE_PATH" --progress --transfers=4 --verbose
          echo "✅ آپلود به Mega.nz با موفقیت انجام شد!"
