name: 🎬🎵🔐👋 NEW2-costume-Multi-Platform Downloader (YouTube + SoundCloud + Split to ZIP) - with Artifact

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      url:
        description: '🔗 لینک ویدئو / آهنگ'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشهٔ ذخیره'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # فقط نیاز به خواندن مخزن داریم (برای checkout)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      # ============= رمزگشایی فایل کوکی =============
      - name: 🔐 رمزگشایی فایل cookies.txt.gpg
        run: |
          if [ ! -f "cookies.txt.gpg" ]; then
            echo "❌ خطا: فایل cookies.txt.gpg در مخزن یافت نشد!"
            exit 1
          fi
          gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          if [ -s cookies.txt ]; then
            echo "✅ فایل cookies.txt با موفقیت رمزگشایی شد."
          else
            echo "❌ خطا: رمزگشایی ناموفق بود یا فایل کوکی خالی است."
            exit 1
          fi
      # ==============================================

      # ============= نصب ابزارها =============
      - name: 🔧 نصب ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip

      - name: ⚙️ نصب yt‑dlp با پشتیبانی از چالش‌های JavaScript
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          aria2: true

      - name: 🧹 پاکسازی پوشهٔ دانلود (فقط برای دانلودهای دستی)
        if: github.event.inputs.folder != 'audio_downloads'
        run: rm -rf "${{ github.event.inputs.folder }}"/*

      # ================= YouTube =================
      - name: ▶️ یوتیوب | دانلود ویدئو (MP4)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ▶️ یوتیوب | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= SoundCloud =================
      - name: ☁️ ساندکلاد | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
            --no-playlist \
            --force-ipv4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ☁️ ساندکلاد | دانلود ویدئو (در صورت وجود)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f bestvideo+bestaudio/best --merge-output-format mp4 \
            --no-playlist \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= بسته‌بندی ویدئوهای بزرگ =================
      - name: ✂️ تبدیل ویدئوهای بزرگ به ZIP چندبخشی
        if: github.event.inputs.format == 'video'
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          for video in "$FOLDER"/*.mp4; do
            [ -e "$video" ] || continue
            SIZE=$(stat -c%s "$video")
            if [ "$SIZE" -gt 94371840 ]; then
              BASENAME=$(basename "$video" .mp4)
              ZIPNAME="$FOLDER/${BASENAME}.zip"
              echo "بسته‌بندی $video ($(numfmt --to=iec $SIZE)) در $ZIPNAME ..."
              zip -s 90m -j "$ZIPNAME" "$video"
              rm "$video"
              echo "✅ فایل به قطعات ZIP تقسیم شد." > "$FOLDER/${BASENAME}_README.txt"
            fi
          done

      # ================= آپلود به عنوان Artifact =================
      - name: 📤 آپلود فایل‌ها به GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "download-${{ github.event.inputs.platform }}-${{ github.run_id }}"
          path: ./${{ github.event.inputs.folder }}/
          retention-days: 90
