name: 📋 Get YouTube Format List

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Install yt-dlp
        run: pip install yt-dlp

      - name: 🧾 Generate format list
        id: generate
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="format_list_${TIMESTAMP}.txt"
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          yt-dlp -F "${{ github.event.inputs.url }}" > "$FILENAME"

      - name: 📤 Upload format list as artifact
        uses: actions/upload-artifact@v4
        with:
          name: format-list
          path: ${{ env.FILENAME }}