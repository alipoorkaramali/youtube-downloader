name: 🎬🎵🔐👋 NEW3.1-costume-Multi-Platform Downloader (YouTube + SoundCloud + Split to ZIP)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 Platform'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      url:
        description: '🔗 Video / Track URL'
        required: true
      format:
        description: '🎬 Output type'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      format_code:
        description: '🎚️ Format code (e.g. 137+140 or bestaudio) – leave empty for auto'
        required: false
        default: ''
      folder:
        description: '📁 Destination folder'
        required: false
        default: 'downloads'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ============= Decrypt cookies =============
      - name: 🔐 Decrypt cookies.txt.gpg
        run: |
          if [ ! -f "cookies.txt.gpg" ]; then
            echo "❌ cookies.txt.gpg not found!"
            exit 1
          fi
          gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          if [ -s cookies.txt ]; then
            echo "✅ cookies.txt decrypted."
          else
            echo "❌ Decryption failed or cookie file empty."
            exit 1
          fi

      # ============= Install yt-dlp & ffmpeg =============
      - name: ⚙️ Install yt-dlp and ffmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          aria2: true
          ffmpeg: true

      - name: 🧹 Clean download folder (if not audio_downloads)
        if: github.event.inputs.folder != 'audio_downloads'
        run: rm -rf "${{ github.event.inputs.folder }}"/*

      # ================= YouTube =================
      - name: ▶️ YouTube | Download video (custom format)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          FORMAT="${{ github.event.inputs.format_code }}"
          if [ -z "$FORMAT" ]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          fi
          yt-dlp -f "$FORMAT" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ▶️ YouTube | Download audio (custom format)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          FORMAT="${{ github.event.inputs.format_code }}"
          if [ -z "$FORMAT" ]; then
            FORMAT="bestaudio[ext=m4a]/bestaudio/best"
          fi
          yt-dlp -f "$FORMAT" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= SoundCloud =================
      - name: ☁️ SoundCloud | Download audio (MP3)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
            --no-playlist \
            --force-ipv4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ☁️ SoundCloud | Download video (if exists)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f bestvideo+bestaudio/best --merge-output-format mp4 \
            --no-playlist \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            --sleep-requests 2 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= Split large files into ZIP parts =================
      - name: ✂️ Split large video files (>30MB) into ZIP parts
        if: github.event.inputs.format == 'video'
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          THRESHOLD=$((30 * 1024 * 1024))
          find "$FOLDER" -type f -size +${THRESHOLD}c \( -name "*.mp4" -o -name "*.m4a" -o -name "*.mp3" \) | while read -r file; do
            if [[ "$file" =~ \.z[0-9]+$ ]] || [[ "$file" =~ \.part- ]]; then
              continue
            fi
            SIZE=$(stat -c%s "$file")
            BASENAME=$(basename "$file")
            NAME="${BASENAME%.*}"
            ZIPNAME="$FOLDER/${NAME}.zip"
            echo "📦 Splitting $file ($(numfmt --to=iec $SIZE)) into 30MB ZIP parts..."
            zip -s 30m -j "$ZIPNAME" "$file"
            rm "$file"
            echo "✅ File split." > "$FOLDER/${NAME}_README.txt"
          done

      # ================= Record upload time =================
      - name: 🕒 Record upload time
        run: python record_upload_time.py "${{ github.event.inputs.folder }}"

      # ================= Commit and push with conflict resolution =================
      - name: 🚀 Commit and push files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          MAX_RETRIES=5
          RETRY_DELAY=10
          
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "🔄 Attempt $i of $MAX_RETRIES for commit and push..."
            
            git fetch origin main
            git stash push --include-untracked -m "costume-stash-$i" || true
            git reset --hard origin/main
            git stash pop || true
            
            if git status --porcelain | grep -E '^UU.*upload_times_'; then
              echo "⚠️ Conflict in upload_times file. Using remote version..."
              git checkout --theirs upload_times_*.txt 2>/dev/null || true
              git add upload_times_*.txt
            fi
            
            git add "${{ github.event.inputs.folder }}" upload_times_*.txt || true
            
            if git diff --staged --quiet; then
              echo "ℹ️ No new files to commit."
              exit 0
            fi
            
            git commit -m "Add files from ${{ github.event.inputs.platform }}"
            
            if git push origin main; then
              echo "✅ Push successful."
              exit 0
            else
              echo "⚠️ Push conflict. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "❌ Push failed after $MAX_RETRIES attempts."
          exit 1

      # ================= Optional release upload =================
      - name: 📦 Upload to Release (small files)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find "${{ github.event.inputs.folder }}" -maxdepth 1 -type f \( -name "*.mp3" -o -name "*.mp4" \) 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No single file found for release."
            exit 0
          fi
          echo "Uploading $FILE to release 'latest'..."
          if gh release view latest &> /dev/null; then
            gh release upload latest "$FILE" --clobber
          else
            gh release create latest "$FILE" \
              --title "Multi-Platform Downloads" \
              --notes "Files under 30MB are placed here."
          fi
          echo "📎 Release link: https://github.com/${{ github.repository }}/releases/tag/latest"