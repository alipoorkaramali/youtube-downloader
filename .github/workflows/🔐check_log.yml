name: 🔐 Check Log & Trigger Downloader

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout current repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install requests
        run: pip install requests

      - name: 🔎 Run check_and_trigger.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_and_trigger.py

      - name: 💾 Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed.txt processed_titles.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update processed state"
            git push
          fi
