name: 🎬🎵 Costume Downloader + Mega.nz

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - soundcloud
      url:
        description: '🔗 لینک دانلود'
        required: true
      type:
        description: 'نوع دانلود'
        required: true
        default: 'audio'
        type: choice
        options:
          - audio
          - video
      quality:
        description: 'کیفیت (برای ویدیو: 1080p, 720p, best)'
        required: false
        default: 'best'
      folder:
        description: '📁 نام پوشه موقت برای دانلود'
        required: false
        default: 'downloads'
      mega_folder:
        description: '📂 نام پوشه در Mega.nz'
        required: false
        default: 'YoutubeDownloads'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Decrypt cookies (if exists)
        run: |
          if [ -f cookies.txt.gpg ]; then
            gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          else
            echo "⚠️ فایل cookies.txt.gpg یافت نشد، ادامه بدون کوکی"
            touch cookies.txt
          fi

      - name: ⚙️ Setup yt-dlp + ffmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          aria2: true
          ffmpeg: true

      - name: 📦 Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: 🔓 Decrypt & Configure rclone & Upload
        run: |
          # ایجاد پوشه تنظیمات
          mkdir -p ~/.config/rclone
          
          # بررسی وجود فایل رمزگذاری شده rclone
          if [ ! -f rclone_mega.conf.gpg ]; then
            echo "❌ فایل rclone_mega.conf.gpg در ریشه مخزن پیدا نشد!"
            exit 1
          fi
          
          # رمزگشایی فایل تنظیمات rclone
          gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.RCLONE_PASSPHRASE }}" --output ~/.config/rclone/rclone.conf rclone_mega.conf.gpg
          chmod 600 ~/.config/rclone/rclone.conf
          
          # تأیید موفقیت
          echo "✅ rclone config loaded. Remotes:"
          rclone listremotes
          
          # آماده‌سازی پوشه دانلود
          mkdir -p "${{ github.event.inputs.folder }}"
          
          # دانلود بر اساس پلتفرم و نوع
          if [ "${{ github.event.inputs.platform }}" = "youtube" ]; then
            if [ "${{ github.event.inputs.type }}" = "video" ]; then
              QUALITY="${{ github.event.inputs.quality }}"
              if [ "$QUALITY" = "best" ]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best"
              fi
              echo "🎬 دانلود ویدیو با فرمت: $FORMAT"
              yt-dlp -f "$FORMAT" \
                --merge-output-format mp4 \
                --cookies cookies.txt \
                "${{ github.event.inputs.url }}" \
                -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            else
              echo "🎵 دانلود صوتی با کیفیت بالا"
              yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
                --audio-format mp3 \
                --cookies cookies.txt \
                "${{ github.event.inputs.url }}" \
                -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            fi
          else
            echo "🎧 دانلود از ساوندکلاود به صورت mp3"
            yt-dlp -x --audio-format mp3 \
              --cookies cookies.txt \
              "${{ github.event.inputs.url }}" \
              -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
          fi
          
          # آپلود به Mega.nz با مشخص کردن مستقیم فایل config (حل مشکل backend not found)
          CONFIG_FILE="$HOME/.config/rclone/rclone.conf"
          echo "📤 آپلود به ریموت: mega"
          echo "📂 پوشه مقصد در مگا: ${{ github.event.inputs.mega_folder }}"
          echo "استفاده از فایل کانفیگ: $CONFIG_FILE"
          
          rclone --config "$CONFIG_FILE" mkdir "mega:${{ github.event.inputs.mega_folder }}" 2>/dev/null || true
          rclone --config "$CONFIG_FILE" copy "${{ github.event.inputs.folder }}" "mega:${{ github.event.inputs.mega_folder }}" \
            --progress \
            --transfers=4 \
            --verbose
          
          echo "✅ آپلود به Mega.nz با موفقیت انجام شد!"
