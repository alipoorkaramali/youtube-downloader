name: 🎬🎵 Costume Downloader + Mega.nz

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - soundcloud
      url:
        description: '🔗 لینک دانلود'
        required: true
      type:
        description: 'نوع دانلود'
        required: true
        default: 'audio'
        type: choice
        options:
          - audio
          - video
      quality:
        description: 'کیفیت (برای ویدیو: 1080p, 720p, best)'
        required: false
        default: 'best'
      folder:
        description: '📁 نام پوشه موقت'
        required: false
        default: 'downloads'
      mega_folder:
        description: '📂 نام پوشه در Mega.nz'
        required: false
        default: 'YoutubeDownloads'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Decrypt cookies (if exists)
        run: |
          if [ -f cookies.txt.gpg ]; then
            gpg --batch --yes --passphrase "${{ secrets.COOKIE_DECRYPT_KEY }}" --decrypt cookies.txt.gpg > cookies.txt
          else
            echo "⚠️ فایل cookies.txt.gpg یافت نشد"
            touch cookies.txt
          fi

      - name: ⚙️ Setup yt-dlp + ffmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          aria2: true
          ffmpeg: true

      - name: 📦 Install latest rclone from official site
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: 🔓 Decrypt & Upload
        run: |
          # رمزگشایی فایل rclone.conf
          mkdir -p ~/.config/rclone
          if [ ! -f rclone_mega.conf.gpg ]; then
            echo "❌ فایل rclone_mega.conf.gpg یافت نشد"
            exit 1
          fi
          gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.RCLONE_PASSPHRASE }}" --output ~/.config/rclone/rclone.conf rclone_mega.conf.gpg
          chmod 600 ~/.config/rclone/rclone.conf
          
          # تست مجدد با rclone تازه نصب شده
          echo "✅ Testing rclone with config:"
          rclone --config ~/.config/rclone/rclone.conf listremotes
          
          # دانلود فایل
          mkdir -p "${{ github.event.inputs.folder }}"
          
          if [ "${{ github.event.inputs.platform }}" = "youtube" ]; then
            if [ "${{ github.event.inputs.type }}" = "video" ]; then
              QUALITY="${{ github.event.inputs.quality }}"
              if [ "$QUALITY" = "best" ]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best"
              fi
              yt-dlp -f "$FORMAT" --merge-output-format mp4 --cookies cookies.txt "${{ github.event.inputs.url }}" -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            else
              yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" --audio-format mp3 --cookies cookies.txt "${{ github.event.inputs.url }}" -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
            fi
          else
            yt-dlp -x --audio-format mp3 --cookies cookies.txt "${{ github.event.inputs.url }}" -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"
          fi
          
          # آپلود به مگا
          CONFIG_FILE="$HOME/.config/rclone/rclone.conf"
          echo "📤 Uploading to mega:${{ github.event.inputs.mega_folder }}"
          rclone --config "$CONFIG_FILE" mkdir "mega:${{ github.event.inputs.mega_folder }}" 2>/dev/null || true
          rclone --config "$CONFIG_FILE" copy "${{ github.event.inputs.folder }}" "mega:${{ github.event.inputs.mega_folder }}" --progress --transfers=4 --verbose
          
          echo "✅ فرآیند با موفقیت پایان یافت"
