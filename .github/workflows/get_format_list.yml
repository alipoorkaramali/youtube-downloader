name: 📋 Get YouTube Format List

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Generate format list
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="format_list_${TIMESTAMP}.txt"
          yt-dlp -F "${{ github.event.inputs.url }}" > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILENAME"
          git commit -m "Add format list: $FILENAME [skip ci]"
          git push